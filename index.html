<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibreglass Workshop Resin Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    margin: 0;
    padding: 0;
}
header {
    background: #ff6600;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}
.container { padding: 20px; }
input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border-radius: 6px;
    border: none;
}
button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
}
.result {
    margin-top: 20px;
    font-size: 20px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 8px;
}
.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }
.flash { animation: flash 1s infinite; }
@keyframes flash {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}
canvas {
    margin-top: 20px;
    background: #111;
    border-radius: 8px;
    width: 100%;
}
</style>
</head>

<body>

<header>Fibreglass Workshop Resin Calculator</header>

<div class="container">

<select id="resinType">
    <option value="summer">Summer Resin (70 min @2%)</option>
    <option value="infusion">Infusion Resin (35 min @1.5%)</option>
    <option value="winter">Winter Resin (25 min @2%)</option>
</select>

<input type="number" step="0.01" id="resinWeight" placeholder="Resin Weight (kg)">
<input type="number" id="tempInput" placeholder="Temperature °C">
<input type="number" id="humidityInput" placeholder="Humidity %">
<input type="number" id="jobTime" placeholder="Desired Working Time (minutes)">

<button onclick="calculateResin()">Calculate</button>

<div class="result" id="resinResult"></div>

<canvas id="cureGraph" height="150"></canvas>

</div>

<script>

function calculateResin() {

    const resinKg = parseFloat(document.getElementById("resinWeight").value);
    const temp = parseFloat(document.getElementById("tempInput").value);
    const humidity = parseFloat(document.getElementById("humidityInput").value);
    const desiredTime = parseFloat(document.getElementById("jobTime").value);
    const type = document.getElementById("resinType").value;

    if (isNaN(resinKg) || isNaN(temp) || isNaN(humidity) || isNaN(desiredTime)) {
        document.getElementById("resinResult").innerHTML = "Fill in all fields.";
        return;
    }

    /* Manufacturer GEL TIMES + BASE % */
    let gelTime;
    let basePercent;

    if (type === "winter") {
        gelTime = 25;
        basePercent = 2;
    } else if (type === "infusion") {
        gelTime = 35;
        basePercent = 1.5;
    } else {
        gelTime = 70;
        basePercent = 2;
    }

    /* Convert Gel → Working Time (70%) */
    const workingMargin = 0.7;
    const baseWorkingTime = gelTime * workingMargin;

    /* Temperature Adjustment */
    const tempFactor = Math.pow(2, (temp - 25) / 10);
    const adjustedWorkingTime = baseWorkingTime / tempFactor;

    /* Catalyst % */
    let catalystPercent = (basePercent/100) * (adjustedWorkingTime / desiredTime);

    if (humidity > 40)
        catalystPercent += (humidity - 40) * 0.00002;

    let hitMax = false;
    if (catalystPercent > 0.03) {
        catalystPercent = 0.03;
        hitMax = true;
    }
    if (catalystPercent < 0.01)
        catalystPercent = 0.01;

    /* Working time based on catalyst */
    let finalWorkingTime = adjustedWorkingTime * ((basePercent/100) / catalystPercent);

    /* -------- MASS EXOTHERM MODEL -------- */
    let exothermFactor = 1 + Math.pow(resinKg, 1.35) * 0.04;

    /* Prevent very small batches being penalised */
    if (resinKg <= 1)
        exothermFactor = 1;

    finalWorkingTime = finalWorkingTime / exothermFactor;

    /* Catalyst mL */
    const resinGrams = resinKg * 1000;
    const catalystDensity = 1.1;
    const catalystML = (resinGrams * catalystPercent) / catalystDensity;

    let html =
        `Resin: <b>${resinKg.toFixed(2)} kg</b><br>` +
        `Catalyst: <b>${(catalystPercent*100).toFixed(2)}%</b><br>` +
        `Catalyst Amount: <b>${catalystML.toFixed(1)} mL</b><br>` +
        `Estimated Working Time (Mass Adjusted): ~${finalWorkingTime.toFixed(0)} mins<br>`;

    /* Fast Kick Warning */
    if (finalWorkingTime < 5)
        html += "<div class='danger flash'>⚠ EXTREME FAST KICK RISK</div>";

    /* Degas Logic */
    if (hitMax && finalWorkingTime > desiredTime) {
        let degas = finalWorkingTime - desiredTime;
        if (degas > 10)
            html += `<div class='danger'>DEGAS REQUIRED: ~${degas.toFixed(0)} mins</div>`;
        else
            html += `<div class='warning'>Degas: ~${degas.toFixed(0)} mins</div>`;
    }

    /* Large Batch Warning */
    if (resinKg >= 9)
        html += "<div class='danger'>⚠ MAX BATCH MASS – HIGH EXOTHERM RISK</div>";

    document.getElementById("resinResult").innerHTML = html;

    drawGraph(finalWorkingTime);
}

function drawGraph(potLife) {
    const canvas = document.getElementById("cureGraph");
    canvas.width = canvas.offsetWidth;
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    ctx.moveTo(0, canvas.height);

    for (let i = 0; i <= potLife; i++) {
        const x = (i / potLife) * canvas.width;
        const y = canvas.height - (Math.pow(i/potLife, 2) * canvas.height);
        ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "#ff6600";
    ctx.lineWidth = 3;
    ctx.stroke();
}

</script>

</body>
</html>
